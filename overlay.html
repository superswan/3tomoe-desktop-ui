<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>3 Tomoe Overlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="static/css/shader-background.css">
  <link rel="stylesheet" href="static/css/style.css">
  <link rel="stylesheet" href="static/css/overlay.css">
  <script src="static/js/dragmove.js"></script>
</head>
<body>
  <div class="overlay-ui-chrome">
    <div class="home-logo-section">
      <h1 class="logo" id="home-site-logo"></h1>
      <p class="tagline" id="home-site-tagline"></p>
    </div>

    <div class="status-line" id="status-line">
      <span class="status-date" id="status-date"></span>
      <span class="status-time" id="status-time"></span>
      <span class="status-weather" id="status-weather">
        <img class="status-weather-icon" id="status-weather-icon" alt="" />
        <span class="status-weather-text" id="status-weather-text">--F</span>
      </span>
    </div>
  </div>

  <div class="overlay-showonly-scrim" id="overlay-showonly-scrim"></div>

  <div class="overlay-dimmer-dock" id="overlay-dimmer-dock">
    <div class="overlay-dimmer-ghost" aria-hidden="true"></div>
    <button class="overlay-dimmer-btn" id="overlay-dimmer-btn" title="Dim Background" aria-label="Dim Background" aria-expanded="false">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path d="M9 21h6v-2H9v2zm3-20C8.14 1 5 4.14 5 8c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-3.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z" fill="currentColor"></path>
      </svg>
    </button>
    <div class="overlay-dimmer-ghost" aria-hidden="true"></div>

    <div class="overlay-dimmer-dropdown" id="overlay-dimmer-dropdown">
      <div class="overlay-dimmer-frame">
        <div class="nav-frame">
          <div class="nav-corner tl"></div>
          <div class="nav-corner tr"></div>
          <div class="nav-corner bl"></div>
          <div class="nav-corner br"></div>
        </div>
        <div class="overlay-dimmer-content">
          <button class="overlay-dimmer-option" data-dim="0">Off</button>
          <button class="overlay-dimmer-option" data-dim="20">Low</button>
          <button class="overlay-dimmer-option" data-dim="40">Medium</button>
          <button class="overlay-dimmer-option" data-dim="60">High</button>
          <button class="overlay-dimmer-option" data-dim="80">Dark</button>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay-widgets-launcher">
    <button class="overlay-widgets-btn" id="overlay-widgets-btn">+</button>
  </div>

  <div class="overlay-version-info" id="overlay-version-info">
    <div class="overlay-version-block">
      <span class="overlay-version-label">OS</span>
      <span class="overlay-version-value" id="overlay-version-os">--</span>
    </div>
    <div class="overlay-version-block">
      <span class="overlay-version-label">SYS</span>
      <span class="overlay-version-value" id="overlay-version-app">--</span>
    </div>
  </div>

  <div class="menu3run-modal-overlay widgets-menu-overlay" id="widgets-menu-modal">
    <div class="menu3run-modal-wrapper quickmenu-modal-wrapper">
      <div class="menu3run-modal" id="widgets-menu-content" tabindex="0">
        <div class="modal-corner tl"></div>
        <div class="modal-corner tr"></div>
        <div class="modal-corner bl"></div>
        <div class="modal-corner br"></div>

        <div class="menu3run-inner">
          <div class="menu3run-card">
            <div class="menu3-header quickmenu-header">
              <div class="logo-section menu3-logo-section">
                <h1 class="logo menu3-logo">Widgets</h1>
                <p class="tagline menu3-tagline">add a widget</p>
              </div>
            </div>
            <div class="menu3run-panel">
              <div class="widgets-list">
                <button class="widgets-item" id="widgets-item-3top">
                  <span>3top</span>
                  <span class="widgets-item-status">CLOSED</span>
                </button>
                <button class="widgets-item" id="widgets-item-3fetch">
                  <span>3fetch</span>
                  <span class="widgets-item-status">CLOSED</span>
                </button>
                <button class="widgets-item" id="widgets-item-3image">
                  <span>image</span>
                  <span class="widgets-item-status">0/3</span>
                </button>
                <button class="widgets-item" id="widgets-item-sense">
                  <span>sense weather</span>
                  <span class="widgets-item-status">CLOSED</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="widget-window top-widget" id="widget-3top">
    <div class="widget-shell">
      <div class="modal-corner tl"></div>
      <div class="modal-corner tr"></div>
      <div class="modal-corner bl"></div>
      <div class="modal-corner br"></div>
      <button class="widget-close" id="widget-3top-close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>

      <div class="menu3run-drag-handle" id="widget-3top-drag-handle">
        <div class="drag-line"></div>
      </div>

      <div class="widget-shell-inner">
        <div id="widget-3top-bars">
          <div class="w3top-group" id="widget-3top-cpu-rows"></div>
          <div class="w3top-group" id="widget-3top-gpu-rows"></div>
          <div class="w3top-group" id="widget-3top-mem-rows"></div>
        </div>

        <div class="w3top-table" id="widget-3top-table">
          <table>
            <colgroup>
              <col class="col-pid">
              <col class="col-user">
              <col class="col-cpu">
              <col class="col-mem">
              <col class="col-rss">
              <col class="col-cmd">
            </colgroup>
            <thead>
              <tr><th>PID</th><th>USER</th><th>CPU%</th><th>MEM%</th><th>RSS</th><th>CMD</th></tr>
            </thead>
            <tbody id="widget-3top-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="widget-window fetch-widget" id="widget-3fetch">
    <div class="widget-shell">
      <div class="modal-corner tl"></div>
      <div class="modal-corner tr"></div>
      <div class="modal-corner bl"></div>
      <div class="modal-corner br"></div>
      <button class="widget-close" id="widget-3fetch-close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>

      <div class="menu3run-drag-handle" id="widget-3fetch-drag-handle">
        <div class="drag-line"></div>
      </div>

      <div class="widget-shell-inner">
        <div class="widget-fetch-content">
          <img class="widget-fetch-logo-large" src="static/image/windows-logo.png" alt="Windows logo">
          <div class="widget-fetch-lines" id="widget-3fetch-lines"></div>
          <div class="widget-fetch-disks" id="widget-3fetch-disks"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="widget-window image-widget" id="widget-3image">
    <div class="widget-shell">
      <div class="modal-corner tl"></div>
      <div class="modal-corner tr"></div>
      <div class="modal-corner bl"></div>
      <div class="modal-corner br"></div>
      <button class="widget-close" id="widget-3image-close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>

      <div class="menu3run-drag-handle" id="widget-3image-drag-handle">
        <div class="drag-line"></div>
      </div>

      <div class="widget-shell-inner">
        <input type="file" id="widget-3image-input" accept="image/*">
        <button class="widget-image-placeholder" id="widget-3image-placeholder" type="button">
          <i class="fa-regular fa-image"></i>
          <span>Select image</span>
        </button>
        <img class="widget-image-view" id="widget-3image-view" alt="Selected image">
      </div>
    </div>
  </div>

  <div class="widget-window sense-weather-widget" id="widget-sense-weather">
    <div class="widget-shell">
      <div class="modal-corner tl"></div>
      <div class="modal-corner tr"></div>
      <div class="modal-corner bl"></div>
      <div class="modal-corner br"></div>
      <button class="widget-close" id="widget-sense-close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>

      <div class="menu3run-drag-handle" id="widget-sense-drag-handle">
        <div class="drag-line"></div>
      </div>

      <div class="widget-shell-inner">
        <div class="sense-weather-layout">
          <div class="sense-status-row">
            <div class="sense-current-temp" id="sense-current-temp">72<span class="sense-current-unit">°</span></div>
            <div class="sense-high-low">
              <div id="sense-high-temp">H 79°</div>
              <div id="sense-low-temp">L 63°</div>
            </div>
          </div>

          <div class="sense-hero">
            <div class="sense-hero-glow" id="sense-hero-glow"></div>
            <img class="sense-hero-main" id="sense-hero-main" src="static/image/weather-icons/03.png" alt="Weather illustration">
            <img class="sense-hero-foreground" id="sense-hero-foreground" src="static/image/weather-icons/03.png" alt="" aria-hidden="true">
          </div>

          <div class="sense-location-block">
            <div class="sense-city" id="sense-city">Providence</div>
            <div class="sense-condition" id="sense-condition">Partly cloudy</div>
            <div class="sense-pager">
              <div id="sense-page-indicator">1/3</div>
              <div class="sense-pager-arrows">↑↓</div>
            </div>
          </div>

          <div class="sense-forecast" id="sense-forecast"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 3Menu Modal (Application Launcher) -->
  <div class="menu3-modal-overlay" id="menu3-modal">
    <div class="menu3-modal-wrapper">
      <div class="menu3-modal" id="menu3-content">
        <div class="modal-corner tl"></div>
        <div class="modal-corner tr"></div>
        <div class="modal-corner bl"></div>
        <div class="modal-corner br"></div>
        <button class="about-close menu3-close" id="menu3-close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>

        <div class="menu3-drag-handle" id="menu3-drag-handle" title="Double-click to toggle lock mode">
          <div class="drag-line"></div>
        </div>

        <div class="menu3-inner">
          <div class="menu3-header">
            <div class="logo-section menu3-logo-section">
              <h1 class="logo menu3-logo">Applications</h1>
              <p class="tagline menu3-tagline">Select a program</p>
            </div>
          </div>

          <div class="menu3-main-container">
            <div class="stack-container menu3-stack-container">
              <div class="card-stack menu3-card-stack" id="menu3-card-stack"></div>
            </div>

            <div class="nav-container menu3-nav-container">
              <div class="nav-frame">
                <div class="nav-corner tl"></div>
                <div class="nav-corner tr"></div>
                <div class="nav-corner bl"></div>
                <div class="nav-corner br"></div>
              </div>

              <button class="nav-btn chamfer" id="menu3-nav-prev">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span>PREV</span>
              </button>

              <div class="nav-counter">
                <span id="menu3-current-index">01</span> / <span id="menu3-total-count">00</span>
              </div>

              <button class="nav-btn chamfer" id="menu3-nav-next">
                <span>NEXT</span>
                <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 3Menu Run Modal -->
  <div class="menu3run-modal-overlay" id="menu3run-modal">
    <div class="menu3run-modal-wrapper">
      <div class="menu3run-modal" id="menu3run-content">
        <div class="modal-corner tl"></div>
        <div class="modal-corner tr"></div>
        <div class="modal-corner bl"></div>
        <div class="modal-corner br"></div>
        <button class="about-close menu3run-close" id="menu3run-close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>

        <div class="menu3run-drag-handle" id="menu3run-drag-handle" title="Drag to move">
          <div class="drag-line"></div>
        </div>

        <div class="menu3run-inner">
          <div class="menu3run-card">
            <div class="menu3run-panel">
              <div class="menu3run-row">
                <label class="menu3run-label" for="menu3run-input">Open</label>
                <input class="menu3run-input" id="menu3run-input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Type a command or path" aria-label="Run command">
              </div>
              <div class="menu3run-actions">
                <button class="menu3run-btn menu3run-primary" id="menu3run-run">Run</button>
                <button class="menu3run-btn" id="menu3run-cancel">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Menu Modal -->
  <div class="menu3run-modal-overlay quickmenu-modal-overlay" id="quickmenu-modal">
    <div class="menu3run-modal-wrapper quickmenu-modal-wrapper">
      <div class="menu3run-modal" id="quickmenu-content" tabindex="0">
        <div class="modal-corner tl"></div>
        <div class="modal-corner tr"></div>
        <div class="modal-corner bl"></div>
        <div class="modal-corner br"></div>
        <button class="about-close menu3run-close quickmenu-close" id="quickmenu-close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>

        <div class="menu3run-drag-handle" id="quickmenu-drag-handle" title="Double-click to toggle lock mode">
          <div class="drag-line"></div>
        </div>

        <div class="menu3run-inner">
          <div class="menu3run-card">
            <div class="menu3-header quickmenu-header">
              <div class="logo-section menu3-logo-section">
                <h1 class="logo menu3-logo" id="quickmenu-title">Quick Menu</h1>
              </div>
            </div>

            <div class="menu3run-panel">
              <div class="menu3run-row">
                <div class="menu3run-actions quickmenu-actions" id="quickmenu-actions"></div>
              </div>
            </div>

            <div class="nav-container quickmenu-nav-container">
              <div class="nav-frame">
                <div class="nav-corner tl"></div>
                <div class="nav-corner tr"></div>
                <div class="nav-corner bl"></div>
                <div class="nav-corner br"></div>
              </div>

              <button class="nav-btn chamfer" id="quickmenu-nav-prev">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span>PREV</span>
              </button>

              <div class="nav-counter">
                <span id="quickmenu-current-page">01</span> / <span id="quickmenu-total-pages">01</span>
              </div>

              <button class="nav-btn chamfer" id="quickmenu-nav-next">
                <span>NEXT</span>
                <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
            </div>

            <div class="quickmenu-utility-row">
              <button class="quickmenu-utility-btn" id="quickmenu-lock">
                <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="1"></rect><path d="M8 11V8a4 4 0 0 1 8 0v3"></path></svg>
              </button>
              <button class="quickmenu-utility-btn" id="quickmenu-signout">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
              </button>
              <button class="quickmenu-utility-btn" id="quickmenu-power">
                <svg viewBox="0 0 24 24"><path d="M12 2v10"></path><path d="M6.2 6.2a8 8 0 1 0 11.6 0"></path></svg>
              </button>
            </div>
          </div>
        </div>

        <div class="quickmenu-confirm-overlay" id="quickmenu-confirm-overlay">
          <div class="quickmenu-confirm-card">
            <div class="modal-corner tl"></div>
            <div class="modal-corner tr"></div>
            <div class="modal-corner bl"></div>
            <div class="modal-corner br"></div>
            <p class="quickmenu-confirm-text" id="quickmenu-confirm-text">Are you sure?</p>
            <div class="quickmenu-confirm-actions">
              <button class="quickmenu-confirm-btn" id="quickmenu-confirm-yes">YES</button>
              <button class="quickmenu-confirm-btn no" id="quickmenu-confirm-no">NO</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- System Info Modal -->
  <div class="system-modal-overlay" id="system-info-modal">
    <div class="about-modal-wrapper">
      <div class="modal-corner tl"></div>
      <div class="modal-corner tr"></div>
      <div class="modal-corner bl"></div>
      <div class="modal-corner br"></div>
      <div class="system-modal">
        <button class="about-close system-close" id="system-close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="about-logo-container system-logo-container">
          <img class="about-logo-img system-logo-img" id="system-logo-img" src="static/image/windows-logo.png" alt="System logo">
          <h2 class="about-logo-text system-logo-text" id="system-title">SYSTEM INFO</h2>
        </div>
        <div class="system-info-meta" id="system-info-meta"></div>
        <div class="system-info-list" id="system-info-list"></div>
      </div>
    </div>
  </div>

  <!-- Settings Menu Modal -->
  <div class="menu-modal-overlay" id="menu-modal">
    <div class="menu-modal-wrapper">
      <div class="menu-modal" id="menu-content">
        <div class="modal-corner tl"></div>
        <div class="modal-corner tr"></div>
        <div class="modal-corner bl"></div>
        <div class="modal-corner br"></div>
        <button class="about-close menu-close" id="menu-close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="menu-drag-handle" id="menu-drag-handle" title="Double-click to toggle lock mode">
          <div class="drag-line"></div>
        </div>
        <div class="menu-inner">
          <div class="logo-section">
            <h1 class="logo">SETTINGS</h1>
            <p class="tagline">SELECT AN OPTION</p>
          </div>

          <div class="main-container">
            <div class="stack-container">
              <div class="card-stack" id="card-stack"></div>
            </div>

            <div class="nav-container">
              <div class="nav-frame">
                <div class="nav-corner tl"></div>
                <div class="nav-corner tr"></div>
                <div class="nav-corner bl"></div>
                <div class="nav-corner br"></div>
              </div>

              <button class="nav-btn chamfer" id="nav-prev">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span>PREV</span>
              </button>

              <div class="nav-counter">
                <span id="current-index">01</span> / <span id="total-count">00</span>
              </div>

              <button class="nav-btn chamfer" id="nav-next">
                <span>NEXT</span>
                <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- About Modal -->
  <div class="about-modal-overlay" id="about-modal">
    <div class="about-modal-wrapper">
      <div class="modal-corner tl"></div>
      <div class="modal-corner tr"></div>
      <div class="modal-corner bl"></div>
      <div class="modal-corner br"></div>
      <div class="about-modal">
        <button class="about-close" id="about-close">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="about-logo-container">
          <img class="about-logo-img" id="about-logo-img" src="" alt="Logo" style="display: none;">
          <h2 class="about-logo-text" id="about-logo-text"></h2>
        </div>
        <p class="about-text" id="about-text"></p>
        <div class="about-footer" id="about-footer" style="display: none;">
          <div class="about-footer-line">
            <span class="about-footer-label">System Version:</span>
            <span class="about-footer-value" id="about-version"></span>
          </div>
          <div class="about-footer-line">
            <span class="about-footer-label">Latest Build:</span>
            <span class="about-footer-value" id="about-build-date"></span>
          </div>
          <div class="about-footer-url" id="about-url"></div>
          <div class="about-footer-copyright" id="about-copyright"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="static/js/overlay-main.js"></script>
</body>
</html>
